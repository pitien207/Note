<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Notes</title>
    <meta
      name="description"
      content="A simple, modern note website with clean cards and a mobile-friendly layout."
    />
    <link rel="icon" href="./src/assets/note-icon.svg?v=3" type="image/svg+xml" sizes="any" />
    <link rel="shortcut icon" href="./src/assets/note-icon.svg?v=3" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Manrope:wght@400;500;600;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/base.css" />
    <link rel="stylesheet" href="./src/styles/layout.css" />
    <link rel="stylesheet" href="./src/styles/components.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="Note home">
          <span class="brand-mark" aria-hidden="true">
            <img src="./src/assets/note-icon.svg" alt="" />
          </span>
          <span class="brand-label">Note</span>
        </a>
        <div class="topbar-actions">
          <button
            class="icon-button"
            id="open-composer"
            type="button"
            aria-label="Create a new note"
            title="Create a new note"
          >
            <span aria-hidden="true">+</span>
          </button>
        </div>
      </header>

      <main class="dashboard">
        <section>
          <div id="notes-grid" class="notes-grid" aria-live="polite"></div>

          <div id="empty-state" class="panel empty-state hidden">
            <h2>No notes found</h2>
            <p>Create a new note to get started.</p>
          </div>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="composer-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>

      <section
        class="panel composer-modal"
        role="dialog"
        aria-modal="true"
        aria-label="Note editor"
      >
        <form id="note-form" class="note-form note-form-minimal">
          <input type="hidden" id="note-id" />

          <input
            id="note-title"
            name="title"
            type="text"
            maxlength="80"
            class="composer-title-input"
            placeholder="Title (optional)"
          />

          <textarea
            id="note-content"
            name="content"
            rows="10"
            maxlength="600"
            class="composer-content-input"
            placeholder=""
            required
          ></textarea>

          <div class="form-actions">
            <button class="primary-button" type="submit" id="submit-note">
              Save
            </button>
            <button class="ghost-button" id="close-composer" type="button">
              Close
            </button>
          </div>
        </form>
      </section>
    </div>

    <div class="delete-dropzone hidden" id="delete-dropzone" aria-hidden="true">
      <div class="delete-dropzone-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M4 7l16 0"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="1.8"
          />
          <path
            d="M10 11l0 6"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="1.8"
          />
          <path
            d="M14 11l0 6"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="1.8"
          />
          <path
            d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.8"
          />
          <path
            d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.8"
          />
        </svg>
      </div>
      <p>Drop here to delete</p>
    </div>

    <script type="module" src="./src/scripts/app.js"></script>
  </body>
</html>
