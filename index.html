<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note | Simple Card Notes</title>
    <meta
      name="description"
      content="A simple, modern note website with clean cards and a mobile-friendly layout."
    />
    <link rel="icon" href="./src/assets/note-icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/base.css" />
    <link rel="stylesheet" href="./src/styles/layout.css" />
    <link rel="stylesheet" href="./src/styles/components.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="Note home">
          <span class="brand-mark" aria-hidden="true">
            <img src="./src/assets/note-icon.svg" alt="" />
          </span>
          <span class="brand-label">Note</span>
        </a>
        <div class="topbar-actions">
          <button
            class="icon-button icon-button-secondary"
            id="open-controls"
            type="button"
            aria-label="Open note controls"
            title="Open note controls"
          >
            <svg
              class="button-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M4 7H20M7 12H17M10 17H14"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2.2"
              />
            </svg>
          </button>
          <button
            class="icon-button"
            id="open-composer"
            type="button"
            aria-label="Create a new note"
            title="Create a new note"
          >
            <span aria-hidden="true">+</span>
          </button>
        </div>
      </header>

      <main class="dashboard">
        <section>
          <p class="notes-counter hidden" id="notes-count">0 notes</p>
          <div id="notes-grid" class="notes-grid" aria-live="polite"></div>

          <div id="empty-state" class="panel empty-state hidden">
            <h2>No notes found</h2>
            <p>Create a new note or change the filters.</p>
          </div>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="composer-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>

      <section
        class="panel composer-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="composer-title"
      >
        <div class="modal-header">
          <div>
            <p class="eyebrow">Note editor</p>
            <h2 id="composer-title">New note</h2>
          </div>
          <button
            class="ghost-button modal-close"
            id="close-composer"
            type="button"
            aria-label="Close note editor"
          >
            Close
          </button>
        </div>

        <form id="note-form" class="note-form">
          <input type="hidden" id="note-id" />

          <label class="field">
            <span class="field-label">Title</span>
            <input
              id="note-title"
              name="title"
              type="text"
              maxlength="80"
              placeholder="Example: Weekly priorities"
              required
            />
          </label>

          <label class="field">
            <span class="field-label">Category</span>
            <select id="note-category" name="category">
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Ideas">Ideas</option>
              <option value="Study">Study</option>
              <option value="Planning">Planning</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Note</span>
            <textarea
              id="note-content"
              name="content"
              rows="8"
              maxlength="600"
              placeholder="Write down what you want to remember..."
              required
            ></textarea>
          </label>

          <label class="toggle">
            <input id="note-pinned" name="pinned" type="checkbox" />
            <span>Pin this note</span>
          </label>

          <div class="form-actions">
            <button class="primary-button" type="submit" id="submit-note">
              Save note
            </button>
            <button class="ghost-button" id="reset-note" type="button">
              Clear
            </button>
          </div>

          <p class="form-hint" id="form-hint">
            Notes are stored in your browser automatically.
          </p>
        </form>
      </section>
    </div>

    <div class="modal hidden" id="controls-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-controls="true"></div>

      <section
        class="panel controls-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="controls-title"
      >
        <div class="modal-header">
          <div>
            <p class="eyebrow">Note controls</p>
            <h2 id="controls-title">Search and filter</h2>
          </div>
          <button
            class="ghost-button modal-close"
            id="close-controls"
            type="button"
            aria-label="Close note controls"
          >
            Close
          </button>
        </div>

        <div class="controls-form">
          <label class="field">
            <span class="field-label">Search</span>
            <input
              id="search-input"
              type="search"
              placeholder="Search notes"
            />
          </label>

          <label class="field">
            <span class="field-label">Category</span>
            <select id="category-filter">
              <option value="all">All categories</option>
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Ideas">Ideas</option>
              <option value="Study">Study</option>
              <option value="Planning">Planning</option>
            </select>
          </label>
        </div>
      </section>
    </div>

    <div class="modal hidden" id="preview-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-preview="true"></div>

      <section
        class="preview-shell"
        role="dialog"
        aria-modal="true"
        aria-label="Note preview"
      >
        <button
          class="ghost-button modal-close preview-close"
          id="close-preview"
          type="button"
          aria-label="Close note preview"
        >
          Close
        </button>
        <div id="preview-card"></div>
      </section>
    </div>

    <script type="module" src="./src/scripts/app.js"></script>
  </body>
</html>
